name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'one_piece_app/**'
      - 'one_piece_scripts/**'
      - 'gh-pages/**'
      - '.github/workflows/deploy.yml'
      - '!one_piece_scripts/cardrush_buying_prices/**' # Ignore raw data snapshots
  pull_request:
    branches:
      - main
    paths:
      - 'one_piece_app/**'
      - 'one_piece_scripts/**'
      - 'gh-pages/**'
      - '.github/workflows/deploy.yml'
      - '!one_piece_scripts/cardrush_buying_prices/**'
  # Allow manual deployment from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'one_piece_app/package-lock.json'

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install and Build 🔧
        run: |
          for asset in cards.json favicon.ico logo192.png logo512.png manifest.json robots.txt wishlist.json; do
            if [ -f "gh-pages/${asset}" ]; then
              cp "gh-pages/${asset}" "one_piece_app/public/${asset}"
            fi
          done
          if [ -d "gh-pages/images" ]; then
            cp -r "gh-pages/images" "one_piece_app/public/"
          fi
          if [ -f one_piece_scripts/one_piece_cards.json ]; then
            cp one_piece_scripts/one_piece_cards.json one_piece_app/public/cards.json
          fi
          if [ -f one_piece_scripts/card_price_overrides.json ]; then
            cp one_piece_scripts/card_price_overrides.json one_piece_app/public/unmatched_prices.json
          fi
          if [ -d "one_piece_app/public/cardrush_buying_prices" ]; then
            rm -rf "one_piece_app/public/cardrush_buying_prices"
          fi
          cd one_piece_app
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export PUBLIC_URL="."
          else
            export PUBLIC_URL="https://dwaoi1.github.io/"
          fi
          npm ci
          npm run build
          test -f build/index.html

      - name: Upload Pages artifact 📦
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: one_piece_app/build

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'github-pages-preview' || 'github-pages' }}
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Skip deploy for pull requests
        if: github.event_name == 'pull_request'
        run: echo "Skipping deploy on pull requests."
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        if: github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4
